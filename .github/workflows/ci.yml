name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  control-plane:
    name: Control Plane (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: control-plane/go.sum
      - run: go mod tidy
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -count=1

  node-agent:
    name: Node Agent (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-agent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo build --locked || cargo build
      - run: cargo clippy --all-targets || true
      - run: cargo test

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - run: npm test

  policies:
    name: Policies (OPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - run: opa fmt --list policies
      - run: opa test policies -v

  images:
    name: Build images
    runs-on: ubuntu-latest
    needs: [control-plane, node-agent, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build control-plane image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: control-plane/Dockerfile
          push: false
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: false
