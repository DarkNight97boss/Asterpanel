global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # OPA exposes Prometheus metrics at /metrics.
  - job_name: opa
    metrics_path: /metrics
    static_configs:
      - targets: ["opa:8181"]

  # Caddy admin endpoint exposes metrics.
  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets: ["caddy:2019"]

  # Control plane: OpenTelemetry/Prometheus instrumentation is on the roadmap;
  # the target is wired here so it lights up as soon as /metrics is exported.
  - job_name: control-plane
    metrics_path: /metrics
    static_configs:
      - targets: ["control-plane:8080"]
